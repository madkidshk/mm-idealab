<script>
const V=[{"key": "A", "tag": "版本 A · 01:58 · ⚠️未上WP", "title": "吉祥物都要出「G-Gravure」？大阪萬博 Myaku-Myaku 寫真集背後嘅 IP 續命術", "html": "<p>唔係惡搞，唔係 PR 老烏，更加唔係啲後生仔一時興起玩自嗨。大阪萬博吉祥物 Myaku-Myaku 推出首本個人寫真集《I myaku you.》，喺外行人眼中係一場荒謬嘅 PR Stunt，但喺行內人眼中，呢場由電通（Dentsu）操刀嘅 Campaign，係一次精準到極致嘅 IP 續命術。好多人笑呢隻嘢設計「崩壞」，但廣告人睇到嘅，係點樣透過一個大膽嘅 Tactical Rollout，將一個官方符號轉化為具有商業自循環能力嘅 Brand asset。呢單嘢唔係要挑戰大眾審美，而係展示緊一種將 IP 人格化到極致、甚至帶點瘋狂嘅商業邏輯。</p>\n<p>講返轉頭，Myaku-Myaku 喺 2022 年剛公開由山下浩平（Kohei Yamashita）設計嘅形象時，輿論簡直係一場 Brand suicide。被網民瘋狂嫌棄「噁心」、「可怕」，甚至有人話見到佢就要行「SAN 值 Check」。但電通嘅創意總監堀晴幸（Horu Haruyuki）非常清醒，佢哋知道喺「可愛吉祥物」飽和到嘔嘅日本市場，平庸即係死罪。佢哋利用 Myaku-Myaku 本身獵奇嘅細胞形態，行一條由「醜萌」到「反差萌」嘅人格化路徑。推出「本格偶像寫真集 (本格グラビア)」呢種 Media format，就係要將一個冷冰冰嘅官方標誌，強行賦予一個「演藝偶像」嘅魂魄。當一個被標籤為「怪物」嘅符號，喺沖繩陽光下起床、喺沙灘曬日光浴，甚至躲在薄紗窗簾後展現所謂嘅「女友感」，呢種認知失調產生嘅威力，令佢由負評逆轉為一種 Cult 爆嘅國民寵兒。策略核心唔係要修正美感，而係要用 Media format 嘅錯位去製造震撼，迫使大眾由「嫌棄」轉向「好奇」。</p>\n<p>呢單嘢最令廣告人致敬嘅，係電通嗰種「認真玩」嘅 Production logic。如果只係求其影幾張相擺上 Social media，嗰種張力根本唔夠維持長線嘅 Brand equity。製作團隊係真係當佢係一個 A-list 偶像去捧：全書厚達 224 頁，遠赴沖繩進行三日兩夜外景拍攝，定價 3,960 日圓，規格完全對標一線寫真星。執行細節位更加係玩到極致，寫真集裡面包含日本雜誌最誘人嘅「袋とじ（袋裝密封頁）」，呢種常見於成人或偶像刊物嘅設計，象徵住「禁忌」與「私密」，用喺一個官方吉祥物身上，簡直係一次絕妙嘅 Subversion of authority。佢哋仲整埋隨機特典小卡，甚至喺東京、大阪、名古屋舉辦實體「手渡會」，由 Myaku-Myaku 親自將書交畀粉絲。呢種 O2O Activation 嘅執行力，將一個原本可能流於低俗嘅 Bad idea，昇華成一個具備 Professional register 嘅品牌範例。</p>\n<p>唔好以為呢啲只係創意人嘅自嗨，背後係有紮實嘅 Hard data 支撐呢套粉絲經濟。明明一開始被罵到體無完膚，明明形態扭曲到似外星寄生體，但截至 2025 年 10 月世博閉幕前，相關周邊商品銷售額已經衝破 1,250 億日圓。你要知道，呢類 Licensing revenue 嘅 6% 至 10% 係要上繳，呢筆錢直接推高咗萬博嘅營運盈餘去到 320 億至 370 億日圓。電通選擇喺 2026 年 4 月，即係萬博閉幕半年後、開幕一週年之際推出寫真集，明顯係一場精心計算嘅 Post-Expo survival 策略。對比返熊本熊（Kumamon）11 年間全球累計 1 兆日圓嘅長尾價值，電通呢套寫真集策略，係要確保 Myaku-Myaku 喺世博散場後，依然可以憑住「個人偶像」嘅身分喺市場收割，唔會變成用完即棄嘅 Event legacy。</p>\n<p>對比返香港嘅情況，我哋唔係冇出色嘅形象，例如「任何仁」或者「大嘥鬼」，但香港品牌方嘅死穴在於，我哋好叻做低成本爆紅嘅小聰明，卻缺乏一種追求 High-end execution 嘅骨氣。如果香港有官方吉祥物想拍呢類「性感寫真集」，信我，未出門口已經被客嗰邊嘅 Compliance 同 Legal 部門落閘，又或者因為怕被網民話「浪費公帑」而縮沙。香港廣告圈長期沉溺於追求 Viral vanity metrics，覺得一個 Post 有幾萬個 Like 就叫成功；但日本電通展示嘅係 Long-tail ROI，係點樣說服一個嚴肅嘅官方機構，容許一個「擦邊球」甚至怪誕嘅創意落地，並將其轉化為真實嘅銷售額。香港欠缺嘅唔係創意，而係容許創意變態、成熟、最後變成產業嘅土壤。</p>\n<p>Myaku-Myaku 嘅案例話畀大家聽，IP 嘅生命力唔係源自佢有幾「正確」，而係源自佢有幾多「靈魂」。當你認真對待一個虛構角色，用最高規格嘅 Production 去堆砌佢嘅人格，公眾自然會產生情感連結。呢種由獵奇走向國民偶像嘅過程，本質上就係一場對於品牌塑造嘅高級冒險。如果創作人冇咗嗰種「玩認真」嘅傲氣，我哋產出嘅永遠只會係面目模糊嘅宣傳符號，而唔係可以跨越時代、持續收割嘅 IP 資產。</p>\n<p>當人哋連一隻「寄生獸」都可以經營成國民偶像，我哋仲喺度執著緊嗰幾粒 Like 同 Share，你係咪真係識玩廣告？</p>", "wc": 2113}, {"key": "B", "tag": "版本 B · 02:14 · ✅WP #5968", "title": "大阪萬博「血眼怪」Myaku-Myaku 出寫真集？扮日本偶像玩「袋とじ」的 IP 延命術", "html": "<p>唔係日本官方發癲，唔係廣告公司集體玩膠，更唔係一場純粹博君一粲嘅惡作劇。將一隻外型備受爭議、甚至一度被網民形容為「核突、獵奇、恐怖」嘅大阪萬博吉祥物 Myaku-Myaku 偶像化，仲要煞有介事咁出寫真集，背後其實係一場極度精算嘅 `Commercial strategy`。當全世界仲喺度笑緊呢隻「血眼怪」嘅時候，電通（Dentsu）同埋萬博官方已經用呢套 `IP extension` 手法，話畀大家聽咩叫真正嘅品牌活化。</p>\n<p>呢本名為《I myaku you.》嘅寫真集，標題本身就係一個好精準嘅 `Creative pun`。日文入面嘅「脈」（Myaku）指嘅係脈搏，官方透過呢個名去暗示「脈動」同「心跳」，旨在令受眾將對呢隻怪獸嘅「恐懼」轉化為「心動」嘅 `Excitement`。呢份執行規格高到令人心寒，由 Dentsu 創意總監堀晴幸（Hori Haruyuki）親自領軍，動用專業攝影師てんてん（Tenten），專程飛去沖繩進行三日兩夜外景拍攝。224 頁嘅厚度，完全參照日本本格偶像寫真集（Gravure）嘅 `Visual identity`：由披住床單嘅「成熟表情」，到坐進跑車嘅「時尚姿態」，甚至喺沙灘漫步嘅「情感瞬間」，Myaku-Myaku 做足晒 J-Pop 偶像會做嘅動作。官方甚至安排咗實體「手渡會」（Hand-over events），讓呢個 IP 跳出螢幕，提供一種具備 `Human touch` 嘅偶像體驗。呢種對細節嘅「認真度」，令原本看似惡搞嘅概念提升到 `High-spec production` 嘅層次，證明咗「認真玩膠」先係最高境界。</p>\n<p>從策略角度睇，呢個係一個教科書級別嘅 `Value flip`。Myaku-Myaku 喺 2022 年剛曝光嗰陣，因為外型太過突兀，幾乎係一場 PR 災難。但官方並冇退縮，反而將呢種「獵奇嫌棄」推向極致，利用日本文化中獨特嘅「醜萌」（Kimokawaii）美學建立 `Emotional connection`。數據足以說明一切：大阪萬博嘅整體經濟效果估計高達 3.05 兆日圓，其中商品銷售額（Merchandise sales）就佔咗 1.64 兆日圓。雖然萬博訪客量一度令人憂慮，但單係 Myaku-Myaku 嘅相關產品銷售額就接近 800 億日圓，遠超預期，寫真集喺首發當日更喺部分書店即時 `Sold out`。呢種將最初嘅公關負資產轉化為巨大商業價值嘅能力，證明咗當你敢於擁抱品牌嘅爭議性，爭議本身就係最強大嘅 `Commercial value`。</p>\n<p>業界最值得留意嘅係「袋とじ」（密封內頁）呢個策略點。喺日本偶像文化入面，密封內頁通常帶有一種「有品味嘅色情」暗示，對一個官方吉祥物嚟講，呢個係極度大膽嘅 `Blue ocean strategy`。對比熊本熊（Kumamon）嗰種典型嘅合家歡路線，Myaku-Myaku 行嘅係一條「非典型偶像」之路。佢唔係要同你做朋友，佢係要同受眾「調情」。呢種做法接近 Durex 常見嘅 `Classy marketing`，將次文化元素融入嚴肅嘅官方活動，這種 `Brand honesty` 反而令受眾覺得品牌夠真、夠敢玩。呢種策略目標唔單止係為咗短期嘅 `Campaign` 爆數，更係要喺萬博結束後，成功延續 IP 嘅 `Life cycle`，將其從單純嘅「活動公仔」轉化為具備長期經營價值嘅 `Cultural icon`。</p>\n<p>掉轉頭睇香港，好多廣告人仲係停留喺賣「小聰明」嘅階段。見到日本玩寫真集，香港品牌頂多只會盲抄一個「騎呢」外殼，或者做啲低成本嘅抽水帖文，完全缺乏背後嘅 `Marketing logic` 同 `Production value`。我成日講，`Creativity` 其實只係經過精心包裝嘅 `Common sense`。如果你只係識得攞個 IP 出嚟做「些牙」或者執個 Meme，而唔去思考點樣建立長線嘅 `Brand building` 同商業模式，咁你永遠只能夠製造一啲短期嘅「爆數」幻覺，對品牌資產毫無累積。要處理一個受爭議嘅形象，你唔係要閃避或者修飾，而係要學習日本廣告人點樣透過精準嘅計算，將「劣勢」轉化為「記憶點」，將短期盛事轉化為長期嘅 IP 延命術。</p>\n<p>歸根究底，IP 活化嘅核心唔係視覺上有幾靚，而係決策者有無嗰份打破常規、敢於冒險嘅勇氣。Myaku-Myaku 嘅寫真集話畀大家聽，當官方唔再自視過高、唔再死守所謂嘅「體面」，品牌先至有真正嘅生命力。</p>\n<p>誰說吉祥物不能有性感背面？</p>", "wc": 1896}];
