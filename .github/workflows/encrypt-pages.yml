name: Deploy Pages (no password)

# 廣告狂人 mm-idealab：Raymond 2026-06-15「拎走密碼」→ 唔再 staticrypt 加密。
# 仍然每頁加 noindex（任何人有 link 入到，但 Google 唔收錄）。push→main 觸發 → deploy Pages。
# 要還原密碼 = git revert 返 staticrypt 版（git history）。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage site + add noindex (no encryption)
        run: |
          set -e
          mkdir -p dist
          rsync -a --exclude='.git' --exclude='.github' --exclude='dist' ./ dist/
          count=0
          while IFS= read -r -d '' f; do
            grep -q 'name="robots"' "$f" || sed -i 's#<head>#<head><meta name="robots" content="noindex,nofollow">#' "$f"
            count=$((count+1))
          done < <(find dist -name '*.html' -print0)
          echo "noindex on $count html file(s); NO password gate"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
