<!DOCTYPE html><html lang="zh-HK"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TVC/CM 觀察庫</title>
<meta name="robots" content="noindex,nofollow"><style>:root{--bg:#f4f5f7;--card:#fff;--ink:#1b1f27;--mut:#717784;--line:#e7e9ee;--accent:#4f46e5;--grn:#15a34a;--red:#dc2626;--sh:0 1px 2px rgba(20,24,40,.04),0 4px 14px rgba(20,24,40,.05)}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.65 -apple-system,BlinkMacSystemFont,"PingFang HK","Microsoft JhengHei",sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:760px;margin:0 auto;padding:22px 15px 80px}
h1{font-size:25px;font-weight:800;margin:.1em 0;letter-spacing:-.01em} .sub{color:var(--mut);font-size:13px;margin-bottom:18px}
.grid{display:grid;grid-template-columns:1fr;gap:12px}

.card{display:block;text-decoration:none;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:16px;padding:17px 18px;box-shadow:var(--sh)}
.card:active{border-color:#cfd3dc}
.dept{font-size:21px;font-weight:800} .topic{color:var(--mut);font-size:14px;margin:3px 0 11px;min-height:20px}
.due-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.due{display:inline-block;font-size:12px;font-weight:800;border-radius:999px;padding:3px 10px}
.due.ok{background:#e7f7ee;color:var(--grn)} .due.over{background:#fdeaea;color:var(--red)} .due.none{background:#eef0f3;color:var(--mut)}
.dday{color:var(--mut);font-size:12.5px;font-weight:600}
.go{margin-top:12px;color:var(--accent);font-size:13px;font-weight:700}
.empty{color:var(--mut)}
.sect{font-size:16px;font-weight:800;margin:24px 0 10px;border-left:4px solid var(--sect);padding-left:9px}
.sect.tight{margin-top:6px}
details.soft{background:#fff;border:1px solid var(--line);border-radius:14px;padding:4px 16px;margin:18px 0;box-shadow:var(--sh)}

details.soft>summary::-webkit-details-marker{display:none} details.soft>summary::before{content:"▸ ";} details.soft[open]>summary::before{content:"▾ ";}
details.soft .grid{margin:6px 0 12px}
footer{color:var(--mut);font-size:12px;border-top:1px solid var(--line);margin-top:30px;padding-top:14px}.titlerow{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:nowrap}
.titlerow h1{margin:0;min-width:0}
.hdrbtns{flex:none;display:flex;gap:7px;align-items:center}
.homebtn,.refbtn{flex:none;white-space:nowrap;font-size:16px;line-height:1;text-decoration:none;background:#eef0fe;border:1px solid #dcdffb;border-radius:8px;padding:5px 9px;color:#222}
.refbtn{cursor:pointer}
.labbtn{flex:none;white-space:nowrap;font-size:13px;line-height:1;text-decoration:none;border-radius:9px;padding:7px 10px;font-weight:800;border:1px solid transparent}
.labbtn.mk{background:#fff5f5;color:#EE382F;border-color:#f3b4ae}
.labbtn.mm{background:#fff7ed;color:#d97706;border-color:#fdba74}
@media(max-width:480px){.homebtn,.refbtn{font-size:14px;padding:5px 8px}}.secthead{font-size:16px;font-weight:800;margin:24px 0 10px;border-left:4px solid #4f46e5;padding-left:9px;color:#1b1f27}
.secthead.tight{margin-top:10px}
.sectbadge{display:inline-block;margin-left:8px;font-size:11px;font-weight:800;border-radius:999px;padding:2px 8px;background:#eef0fe;color:#4f46e5}.pill{display:inline-block;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px;background:#eef0f3;color:#555}
.pill.ok{background:#e7f7ee;color:#15803d}
.pill.warn{background:#fff4e5;color:#b45309}
.pill.bad{background:#fdeaea;color:#dc2626}
.pill.accent{background:#eef0fe;color:#4f46e5}details.soft{background:#fff;border:1px solid #e7e9ee;border-radius:10px;padding:4px 12px}
details.soft>summary{cursor:pointer;font-size:12.5px;font-weight:700;color:#444;padding:8px 0;list-style:none}
details.soft>summary::-webkit-details-marker{display:none}
details.soft>summary::before{content:"▸ ";color:#9aa0ab}
details.soft[open]>summary::before{content:"▾ "}.surface-card{background:#fff;border:1px solid #e7e9ee;border-radius:14px;box-shadow:0 1px 2px rgba(20,24,40,.05),0 6px 18px rgba(20,24,40,.07)}
.surface-card.soft{background:#fafbfd}
.surface-card.warn{background:#fff8f1;border-color:#fcd9b6}
.surface-card.danger{border-color:#f3b4ae;box-shadow:0 2px 16px rgba(238,56,47,.08)}
.surface-card.pad-sm{padding:9px 10px}
.surface-card.pad-md{padding:15px 17px}
.surface-card.pad-lg{padding:18px}
.surface-card.selected{border-color:#4f46e5;box-shadow:0 0 0 2px rgba(79,70,229,.25),0 6px 18px rgba(79,70,229,.18)}.lbx{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:none;align-items:center;justify-content:center;padding:12px}
.lbx.on{display:flex}
.lbx img{max-width:98vw;max-height:94vh;border-radius:8px;cursor:zoom-out}
.lbx .x{position:fixed;top:10px;right:16px;color:#fff;font-size:30px;font-weight:800;cursor:pointer}
.lbx .hint{position:fixed;bottom:12px;left:0;right:0;text-align:center;color:#bbb;font-size:12px}.source-panel{margin:10px 0;border:1px solid #e7e9ee;border-radius:10px;padding:8px 12px;background:#fff}
.source-panel>summary{cursor:pointer;font-size:13px;font-weight:600;color:#007aff;list-style:none}
.source-panel>summary::-webkit-details-marker{display:none}
.source-list{margin:8px 0}
.source-item{display:flex;align-items:flex-start;gap:7px;padding:4px 0;font-size:12.5px;border-bottom:1px solid #e7e9ee}
.source-item:last-child{border-bottom:none}
.source-item input{margin-top:2px;flex-shrink:0}
.source-type{font-size:10px;font-weight:700;border-radius:4px;padding:1px 5px;background:#f4f5f7;color:#717784;white-space:nowrap}
.source-note-row{margin:8px 0 0}
.source-note{width:100%;border:1px solid #e7e9ee;border-radius:10px;padding:8px 10px;font-size:13px;font-family:inherit}
.source-note:focus{outline:2px solid #007aff;border-color:transparent}:root{--ac:#4f46e5;--gn:#0A7D3F;--bd:#e7e9ee}
.wrap{max-width:1080px}
.bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}
.bar input[type=search]{flex:1;min-width:160px;padding:9px 11px;border:1px solid var(--bd);border-radius:10px;font-size:14px}
.bar select{padding:9px 11px;border:1px solid var(--bd);border-radius:10px;font-size:14px;background:#fff}
.watch-card{margin-bottom:11px}
.watch-card h2{font-size:16px;margin:0 0 3px;line-height:1.35}.meta{color:#6b7280;font-size:12.5px;margin-bottom:8px}
.pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.idea{font-size:14px;line-height:1.5;margin:0 0 7px}.lesson{font-size:13px;color:#374151;background:#fafafe;border-left:3px solid var(--ac);padding:6px 10px;border-radius:0 8px 8px 0;margin:0 0 9px}
details.soft{margin:0 0 8px}
pre{white-space:pre-wrap;word-break:break-word;background:#f7f7f4;border:1px solid var(--bd);border-radius:8px;padding:10px;max-height:230px;overflow:auto;font-size:12px;line-height:1.48}
.mcar{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;border:1px solid var(--bd);border-radius:11px;margin:2px 0 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.slide{flex:0 0 100%;scroll-snap-align:start;position:relative;cursor:zoom-in;background:#f1f3f6}.slide img{display:block;width:100%;max-height:340px;object-fit:contain;background:#111}
.slide .tag{position:absolute;left:8px;top:8px;background:rgba(20,20,28,.6);color:#fff;font-size:11px;padding:2px 8px;border-radius:7px}.slide .zoom{position:absolute;right:8px;bottom:8px;background:rgba(20,20,28,.6);color:#fff;font-size:12px;padding:3px 8px;border-radius:7px}
.links{display:flex;flex-wrap:wrap;gap:7px}.lk{font-size:12.5px;text-decoration:none;padding:5px 10px;border-radius:8px;border:1px solid var(--bd);background:#fff;color:#333;white-space:nowrap}
.empty{text-align:center;color:#9ca3af;padding:40px 0}@media(max-width:600px){.wrap{padding:10px}}
</style></head><body><div class="wrap">
<!-- generated-by: scripts/core/nlm-bridge/lab_ui_shell.py -->
<div class='titlerow'><h1>TVC/CM 觀察庫</h1><span class='hdrbtns'><a class='homebtn' href='.' title='總目錄'>🏠</a><button class='refbtn' onclick="location.href=location.pathname+'?t='+Date.now()+location.hash" title='重新載入'>🔄</button></span></div>
<div class="sub">專門收 TVC/CM：一條片一張 card，保留 transcript、OCR、storyboard 截圖；不混入 award/campaign case 庫 · 更新 2026-07-19 09:00 HKT · 0 clips</div>
<div class="bar"><input type="search" id="q" placeholder="搜尋品牌 / 片名 / hook / transcript…"><select id="theme"><option value="">全部主題</option></select></div><div id="list"><div class="empty">No cases yet.</div></div>
<footer>Madman Idea Lab</footer>
</div>
<div id="lb" class="lbx"><span id="lbx" class="x">✕</span><div id="lbc"></div><div class="hint">點一下關閉</div></div>
<script>
const $=s=>document.querySelector(s);
function render(){
 const q=$("#q").value.trim().toLowerCase(), t=$("#theme").value;
 document.querySelectorAll(".card").forEach(c=>{
   const ok=(!t||c.dataset.theme===t)&&(!q||c.textContent.toLowerCase().includes(q));
   c.style.display=ok?"":"none";
 });
}
$("#q").oninput=render;$("#theme").onchange=render;
document.addEventListener("click",e=>{const m=e.target.closest(".slide");if(m){$("#lbc").innerHTML=`<img src="${m.dataset.img}">`;$("#lb").classList.add("on");} if(e.target.id==="lb"||e.target.id==="lbx"){$("#lbc").innerHTML="";$("#lb").classList.remove("on");}});
document.addEventListener("keydown",e=>{if(e.key==="Escape"){$("#lbc").innerHTML="";$("#lb").classList.remove("on");}});
</script></body></html>
